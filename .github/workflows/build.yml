name: Build CustomFishing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ⬅️ penting agar git history lengkap

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - run: chmod +x gradlew
      - run: ./gradlew clean build --no-daemon

      - name: Collect JARs
        run: |
          mkdir -p artifacts
          find . -path "*/build/libs/*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" -exec cp {} artifacts/ \;
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: CustomFishing-Build-${{ github.sha }}
          path: artifacts/

      - name: Get version
        id: version
        run: echo "version=$(grep '^project_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CustomFishing v${{ steps.version.outputs.version }}
          files: artifacts/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          