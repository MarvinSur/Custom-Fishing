name: Build and Release CustomFishing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
      - run: chmod +x gradlew
      - run: ./gradlew clean buildAll --no-daemon

      - name: Collect JARs
        run: |
          mkdir -p artifacts
          cp core/build/libs/CustomFishing-*.jar artifacts/ || true
          cp api/build/libs/CustomFishing-api-*.jar artifacts/ || true
          cp compatibility/build/libs/CustomFishing-compatibility-*.jar artifacts/ || true
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CustomFishing-Build-${{ github.sha }}
          path: artifacts/

      - name: Get version
        id: version
        run: echo "version=$(grep '^project_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CustomFishing v${{ steps.version.outputs.version }}
          files: artifacts/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          